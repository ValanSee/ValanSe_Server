spring:
  application:
    name: valanse

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  data:
    redis:
      repositories:
        enabled: false

  sql:
    init:
      mode: never

jwt:
  secret: ZHVtbXktc2VjcmV0LWZvci10ZXN0LWR1bW15LXNlY3JldC1mb3ItdGVzdA==
  access-token-expiration: 15
  refresh-token-expiration: 10080

admin:
  username: admin
  password: admin
oauth:
  kakao:
    client-id: test-client-id
    redirect-uri: http://localhost

cloudflare:
  r2:
    account-id: test-account-id
    endpoint: http://localhost:9000
    bucket: test-bucket
    access-key: test-access-key
    secret-key: test-secret-key
    public-url: http://localhost:9000/test-bucket
