name: Deploy To EC2 (Development)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository 파일 불러오기
        uses: actions/checkout@v4

      - name: JDK 17 설치 및 Gradle 캐시 적용
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: application.yml 파일 만들기
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_PROPERTIES }}" > src/main/resources/application.yml
          test -n "$ADMIN_USERNAME"
          test -n "$ADMIN_PASSWORD"
          perl -0pi -e 's/\$\{ADMIN_USERNAME:[^}]*\}/$ENV{ADMIN_USERNAME}/g' src/main/resources/application.yml
          perl -0pi -e 's/\$\{ADMIN_PASSWORD:[^}]*\}/$ENV{ADMIN_PASSWORD}/g' src/main/resources/application.yml

      - name: 테스트 & 빌드
        run: ./gradlew clean build

      - name: AWS Resource에 접근할 수 있도록 AWS credentials 설정하기
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: ECR에 로그인하기
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 생성
        run: docker build -t valanse-docker-images .

      - name: Docker 이미지에 Tag 붙이기 (dev)
        run: |
          docker tag valanse-docker-images ${{ steps.login-ecr.outputs.registry }}/cicdprac:dev
          docker tag valanse-docker-images ${{ steps.login-ecr.outputs.registry }}/cicdprac:dev-${{ github.sha }}

      - name: ECR에 Docker 이미지 Push하기
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/cicdprac:dev
          docker push ${{ steps.login-ecr.outputs.registry }}/cicdprac:dev-${{ github.sha }}

      - name: SSH로 EC2에 접속하여 Development 서버 재배포
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script_stop: true
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION
          script: |
            cd ~/valanse
            
            # ECR 로그인
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            # 배포할 커밋의 고정 이미지 pull
            IMAGE_TAG=dev-${{ github.sha }}
            docker pull ${{ steps.login-ecr.outputs.registry }}/cicdprac:$IMAGE_TAG

            # Compose가 고정 이미지 태그를 사용하도록 배포 상태 저장
            PREVIOUS_IMAGE_TAG=$(sed -n 's/^VALANSE_DEV_IMAGE_TAG=//p' .env | tail -n 1)
            if [ -n "$PREVIOUS_IMAGE_TAG" ]; then
              if grep -q '^VALANSE_DEV_PREVIOUS_IMAGE_TAG=' .env; then
                sed -i "s/^VALANSE_DEV_PREVIOUS_IMAGE_TAG=.*/VALANSE_DEV_PREVIOUS_IMAGE_TAG=$PREVIOUS_IMAGE_TAG/" .env
              else
                printf '\nVALANSE_DEV_PREVIOUS_IMAGE_TAG=%s\n' "$PREVIOUS_IMAGE_TAG" >> .env
              fi
            fi
            if grep -q '^VALANSE_DEV_IMAGE_TAG=' .env; then
              sed -i "s/^VALANSE_DEV_IMAGE_TAG=.*/VALANSE_DEV_IMAGE_TAG=$IMAGE_TAG/" .env
            else
              printf '\nVALANSE_DEV_IMAGE_TAG=%s\n' "$IMAGE_TAG" >> .env
            fi
            chmod 600 .env
            
            # development 컨테이너 재시작 (8082)
            docker compose up -d --wait --wait-timeout 120 valanse-dev-server
            
            # 사용하지 않는 이미지 정리
            docker image prune -f
