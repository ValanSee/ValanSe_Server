name: Deploy To EC2 (Development)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository нММмЭЉ лґИлЯђмШ§кЄ∞
        uses: actions/checkout@v4

      - name: JDK 17 мД§мєШ л∞П Gradle мЇРмЛЬ м†БмЪ©
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: application.yml нММмЭЉ лІМлУ§кЄ∞
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_PROPERTIES }}" > src/main/resources/application.yml
          test -n "$ADMIN_USERNAME"
          test -n "$ADMIN_PASSWORD"
          perl -0pi -e 's/\$\{ADMIN_USERNAME:[^}]*\}/$ENV{ADMIN_USERNAME}/g' src/main/resources/application.yml
          perl -0pi -e 's/\$\{ADMIN_PASSWORD:[^}]*\}/$ENV{ADMIN_PASSWORD}/g' src/main/resources/application.yml

      - name: нЕМмК§нКЄ & лєМлУЬ
        run: ./gradlew clean build

      - name: AWS ResourceмЧР м†СкЈЉнХ† мИШ мЮИлПДл°Э AWS credentials мД§м†ХнХШкЄ∞
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: ECRмЧР л°ЬкЈЄмЭЄнХШкЄ∞
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker мЭілѓЄмІА мГЭмД±
        run: docker build -t valanse-docker-images .

      - name: Docker мЭілѓЄмІАмЧР Tag лґЩмЭікЄ∞ (dev)
        run: |
          docker tag valanse-docker-images ${{ steps.login-ecr.outputs.registry }}/cicdprac:dev
          docker tag valanse-docker-images ${{ steps.login-ecr.outputs.registry }}/cicdprac:dev-${{ github.sha }}

      - name: ECRмЧР Docker мЭілѓЄмІА PushнХШкЄ∞
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/cicdprac:dev
          docker push ${{ steps.login-ecr.outputs.registry }}/cicdprac:dev-${{ github.sha }}

      - name: SSHл°Ь EC2мЧР м†СмЖНнХШмЧђ Development мДЬл≤Д мЮђл∞∞нПђ
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION
          script: |
            set -euo pipefail
            cd ~/valanse
            
            # ECR л°ЬкЈЄмЭЄ
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            # л∞∞нПђнХ† мї§л∞ЛмЭШ к≥†м†Х мЭілѓЄмІА pull
            IMAGE_TAG=dev-${{ github.sha }}
            docker pull ${{ steps.login-ecr.outputs.registry }}/cicdprac:$IMAGE_TAG

            # Composeк∞А к≥†м†Х мЭілѓЄмІА нГЬкЈЄл•Љ мВђмЪ©нХШлПДл°Э л∞∞нПђ мГБнГЬ м†АмЮ•
            CURRENT_IMAGE_TAG=$(sed -n 's/^VALANSE_DEV_IMAGE_TAG=//p' .env | tail -n 1)
            PREVIOUS_IMAGE_TAG=$(sed -n 's/^VALANSE_DEV_PREVIOUS_IMAGE_TAG=//p' .env | tail -n 1)
            if [ -z "$PREVIOUS_IMAGE_TAG" ]; then
              PREVIOUS_IMAGE_TAG=$CURRENT_IMAGE_TAG
            fi
            if [ -n "$CURRENT_IMAGE_TAG" ] && [ "$CURRENT_IMAGE_TAG" != "$IMAGE_TAG" ]; then
              PREVIOUS_IMAGE_TAG=$CURRENT_IMAGE_TAG
              if grep -q '^VALANSE_DEV_PREVIOUS_IMAGE_TAG=' .env; then
                sed -i "s/^VALANSE_DEV_PREVIOUS_IMAGE_TAG=.*/VALANSE_DEV_PREVIOUS_IMAGE_TAG=$PREVIOUS_IMAGE_TAG/" .env
              else
                printf '\nVALANSE_DEV_PREVIOUS_IMAGE_TAG=%s\n' "$PREVIOUS_IMAGE_TAG" >> .env
              fi
            fi
            if grep -q '^VALANSE_DEV_IMAGE_TAG=' .env; then
              sed -i "s/^VALANSE_DEV_IMAGE_TAG=.*/VALANSE_DEV_IMAGE_TAG=$IMAGE_TAG/" .env
            else
              printf '\nVALANSE_DEV_IMAGE_TAG=%s\n' "$IMAGE_TAG" >> .env
            fi
            chmod 600 .env
            
            # development мї®нЕМмЭілДИ мЮђмЛЬмЮС л∞П мЛ§нМ® мЛЬ мІБм†Д мЭілѓЄмІАл°Ь л°§л∞±
            if docker compose up -d --wait --wait-timeout 120 valanse-dev-server; then
              echo "Development deployment succeeded: $IMAGE_TAG"
            else
              echo "Development deployment failed. Rolling back to: $PREVIOUS_IMAGE_TAG"
              docker compose  --tail=100 valanse-dev-server || true

              if [ -z "$PREVIOUS_IMAGE_TAG" ]; then
                echo "Rollback image tag is not available."
                exit 1
              fi

              sed -i "s/^VALANSE_DEV_IMAGE_TAG=.*/VALANSE_DEV_IMAGE_TAG=$PREVIOUS_IMAGE_TAG/" .env
              docker pull ${{ steps.login-ecr.outputs.registry }}/cicdprac:$PREVIOUS_IMAGE_TAG

              if docker compose up -d --force-recreate --wait --wait-timeout 120 valanse-dev-server; then
                echo "Development rollback succeeded: $PREVIOUS_IMAGE_TAG"
              else
                echo "Development rollback failed."
                docker compose logs --tail=100 valanse-dev-server || true
              fi
              exit 1
            fi
            
            # мВђмЪ©нХШмІА мХКлКФ мЭілѓЄмІА м†Хл¶ђ
            docker image prune -f
