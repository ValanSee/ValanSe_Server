name: Deploy To EC2 (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository нҢҢмқј л¶Ҳлҹ¬мҳӨкё°
        uses: actions/checkout@v4

      - name: JDK 17 м„Өм№ҳ л°Ҹ Gradle мәҗмӢң м Ғмҡ©
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: application.yml нҢҢмқј л§Ңл“Өкё°
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_PROPERTIES }}" > src/main/resources/application.yml
          test -n "$ADMIN_USERNAME"
          test -n "$ADMIN_PASSWORD"
          perl -0pi -e 's/\$\{ADMIN_USERNAME:[^}]*\}/$ENV{ADMIN_USERNAME}/g' src/main/resources/application.yml
          perl -0pi -e 's/\$\{ADMIN_PASSWORD:[^}]*\}/$ENV{ADMIN_PASSWORD}/g' src/main/resources/application.yml

      - name: н…ҢмҠӨнҠё л°Ҹ л№Ңл“ң
        run: ./gradlew clean build

      - name: AWS Resourceм—җ м ‘к·јн•  мҲҳ мһҲлҸ„лЎқ AWS credentials м„Өм •н•ҳкё°
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: ECRм—җ лЎңк·ёмқён•ҳкё°
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker мқҙлҜём§Җ мғқм„ұ
        run: docker build -t valanse-docker-images .

      - name: Docker мқҙлҜём§Җм—җ Tag л¶ҷмқҙкё° (prod)
        run: |
          docker tag valanse-docker-images ${{ steps.login-ecr.outputs.registry }}/cicdprac:prod
          docker tag valanse-docker-images ${{ steps.login-ecr.outputs.registry }}/cicdprac:prod-${{ github.sha }}

      - name: ECRм—җ Docker мқҙлҜём§Җ Pushн•ҳкё°
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/cicdprac:prod
          docker push ${{ steps.login-ecr.outputs.registry }}/cicdprac:prod-${{ github.sha }}

      - name: SSHлЎң EC2м—җ м ‘мҶҚн•ҳм—¬ Production м„ңлІ„ мһ¬л°°нҸ¬
        uses: appleboy/ssh-action@v1.0.3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_DEFAULT_REGION
          script: |
            set -euo pipefail
            cd ~/valanse
            
            # ECR лЎңк·ёмқё
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            # л°°нҸ¬н•  м»Өл°Ӣмқҳ кі м • мқҙлҜём§Җ pull
            IMAGE_TAG=prod-${{ github.sha }}
            docker pull ${{ steps.login-ecr.outputs.registry }}/cicdprac:$IMAGE_TAG

            # Composeк°Җ кі м • мқҙлҜём§Җ нғңк·ёлҘј мӮ¬мҡ©н•ҳлҸ„лЎқ л°°нҸ¬ мғҒнғң м ҖмһҘ
            CURRENT_IMAGE_TAG=$(sed -n 's/^VALANSE_PROD_IMAGE_TAG=//p' .env | tail -n 1)
            PREVIOUS_IMAGE_TAG=$(sed -n 's/^VALANSE_PROD_PREVIOUS_IMAGE_TAG=//p' .env | tail -n 1)
            if [ -z "$PREVIOUS_IMAGE_TAG" ]; then
              PREVIOUS_IMAGE_TAG=$CURRENT_IMAGE_TAG
            fi
            if [ -n "$CURRENT_IMAGE_TAG" ] && [ "$CURRENT_IMAGE_TAG" != "$IMAGE_TAG" ]; then
              PREVIOUS_IMAGE_TAG=$CURRENT_IMAGE_TAG
              if grep -q '^VALANSE_PROD_PREVIOUS_IMAGE_TAG=' .env; then
                sed -i "s/^VALANSE_PROD_PREVIOUS_IMAGE_TAG=.*/VALANSE_PROD_PREVIOUS_IMAGE_TAG=$PREVIOUS_IMAGE_TAG/" .env
              else
                printf '\nVALANSE_PROD_PREVIOUS_IMAGE_TAG=%s\n' "$PREVIOUS_IMAGE_TAG" >> .env
              fi
            fi
            if grep -q '^VALANSE_PROD_IMAGE_TAG=' .env; then
              sed -i "s/^VALANSE_PROD_IMAGE_TAG=.*/VALANSE_PROD_IMAGE_TAG=$IMAGE_TAG/" .env
            else
              printf '\nVALANSE_PROD_IMAGE_TAG=%s\n' "$IMAGE_TAG" >> .env
            fi
            chmod 600 .env
            
            # production м»Ён…Ңмқҙл„Ҳ мһ¬мӢңмһ‘ л°Ҹ мӢӨнҢЁ мӢң м§Ғм „ мқҙлҜём§ҖлЎң лЎӨл°ұ
            if docker compose up -d --wait --wait-timeout 120 valanse-server; then
              echo "Production deployment succeeded: $IMAGE_TAG"
            else
              echo "Production deployment failed. Rolling back to: $PREVIOUS_IMAGE_TAG"
              docker compose logs --tail=100 valanse-server || true

              if [ -z "$PREVIOUS_IMAGE_TAG" ]; then
                echo "Rollback image tag is not available."
                exit 1
              fi

              sed -i "s/^VALANSE_PROD_IMAGE_TAG=.*/VALANSE_PROD_IMAGE_TAG=$PREVIOUS_IMAGE_TAG/" .env
              docker pull ${{ steps.login-ecr.outputs.registry }}/cicdprac:$PREVIOUS_IMAGE_TAG

              if docker compose up -d --force-recreate --wait --wait-timeout 120 valanse-server; then
                echo "Production rollback succeeded: $PREVIOUS_IMAGE_TAG"
              else
                echo "Production rollback failed."
                docker compose logs --tail=100 valanse-server || true
              fi
              exit 1
            fi
            
            # мӮ¬мҡ©н•ҳм§Җ м•ҠлҠ” мқҙлҜём§Җ м •лҰ¬
            docker image prune -f
